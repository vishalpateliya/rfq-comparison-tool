services:
  postgres:
    image: postgres:17
    container_name: supplier-quote-postgres

    restart: unless-stopped

    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: supplier_quote_db

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d supplier_quote_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile

    container_name: supplier-quote-backend

    restart: unless-stopped

    depends_on:
      postgres:
        condition: service_healthy

    environment:
      DATABASE_URL: postgresql+psycopg://postgres:postgres@postgres:5432/supplier_quote_db

    ports:
      - "8000:8000"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile

    container_name: supplier-quote-frontend

    restart: unless-stopped

    depends_on:
      - backend

    environment:
      VITE_API_BASE_URL: http://localhost:8000

    ports:
      - "5173:5173"

volumes:
  postgres_data: